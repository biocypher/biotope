site_name: Biotope

# Mirror of the `nav:` block in mkdocs.yml. Consumed by the monorepo
# documentation aggregator, which composes the org-wide nav from each
# submodule's local nav. Keep this file in sync with mkdocs.yml.

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Architecture: architecture.md
  - Project Context: project-context.md
  - Cluster Compliance: cluster-compliance.md
  - Commands:
      - Init: api-docs/init.md
      - Add: api-docs/add.md
      - Map: api-docs/map.md
      - Build: api-docs/build.md
      - Propose Alignment: api-docs/propose-alignment.md
      - Propose Mapping (deprecated): api-docs/propose-mapping.md
      - Annotate: api-docs/annotate.md
      - Search: api-docs/search.md
      - Config: api-docs/config.md
