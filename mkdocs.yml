site_name: Biotope
site_description: Biotope - CLI integration for BioCypher ecosystem packages
site_author: BioCypher Team
site_url: https://biocypher.github.io/biotope/

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

theme:
  features:
    - content.code.annotate
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.top
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Project Context: project-context.md
  - Cluster Compliance: cluster-compliance.md
  - Commands:
      - Init: api-docs/init.md
      - Add: api-docs/add.md
      - Map: api-docs/map.md
      - Build: api-docs/build.md
      - Propose Alignment: api-docs/propose-alignment.md
      - Propose Mapping (deprecated): api-docs/propose-mapping.md
      - Annotate: api-docs/annotate.md
      - Search: api-docs/search.md
      - Config: api-docs/config.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            heading_level: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/biocypher
      name: BioCypher Team

copyright: Copyright &copy 2025–2026 BioCypher Team

repo_url: https://github.com/biocypher/biotope
repo_name: biocypher/biotope
edit_uri: edit/main/docs

watch:
  - biotope
